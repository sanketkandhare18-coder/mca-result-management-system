<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Results —MCA Result Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="result-shell">

    <!-- Top bar -->
    <div class="result-topbar">
        <h2>🎓MCA Result Portal — Genba sopanrao moze college of engineering Pune</h2>
        <div style="display:flex;align-items:center;gap:16px;">
            <span id="stuNameTop">—</span>
            <button onclick="logout()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">Logout</button>
        </div>
    </div>

    <div class="result-main">

        <!-- Student identity card -->
        <div class="result-student-card" id="studentCard">
            <div>
                <h2 id="stuName">Loading…</h2>
                <div class="meta" id="stuMeta">—</div>
            </div>
            <div class="result-summary" id="resultSummary"></div>
        </div>

        <!-- Result content -->
        <div id="resultContent">
            <div style="text-align:center;padding:40px;color:#718096;">Loading result…</div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>

var student = JSON.parse(sessionStorage.getItem('studentUser') || 'null');
if (!student) { window.location.href = 'student-login.html'; }

document.getElementById('stuNameTop').textContent = student.name;
document.getElementById('stuName').textContent    = student.name;
document.getElementById('stuMeta').innerHTML =
    '<span>🎓 ' + student.class + '</span>' +
    '<span>📖 Semester ' + student.semester + '</span>' +
    '<span>🆔 Roll: ' + student.roll_number + '</span>';

function logout() {
    sessionStorage.removeItem('studentUser');
    window.location.href = 'index.html';
}

/* Load result + marks for this student */
async function loadResult() {
    var { data: result } = await window._db.from('results')
        .select('*')
        .eq('student_id', student.id)
        .maybeSingle();

    var { data: subjects } = await window._db.from('subjects')
        .select('*')
        .eq('class', student.class)
        .eq('semester', student.semester)
        .order('sort_order');

    var { data: marks } = await window._db.from('marks')
        .select('*')
        .eq('student_id', student.id);

    renderResult(result, subjects || [], marks || []);
}

function renderResult(result, subjects, marks) {
    var content = document.getElementById('resultContent');
    var summary = document.getElementById('resultSummary');

    /* No result or not published */
    if (!result || !result.published) {
        summary.innerHTML = '';
        content.innerHTML =
            '<div class="no-result-box">' +
            '<div class="nr-icon">⏳</div>' +
            '<h3>Result Not Published Yet</h3>' +
            '<p>Your semester result has not been published. Please check back later or contact your teacher.</p>' +
            '</div>';
        return;
    }

    /* Summary numbers */
    var passClass = result.percentage >= 35 ? '#4ade80' : '#f87171';
    summary.innerHTML =
        '<div class="result-summary-item">' +
            '<strong>' + result.total_marks + '/' + result.max_marks + '</strong><span>Total Marks</span>' +
        '</div>' +
        '<div class="result-summary-item">' +
            '<strong>' + result.percentage + '%</strong><span>Percentage</span>' +
        '</div>' +
        '<div class="result-summary-item">' +
            '<strong style="color:' + passClass + ';">' + result.grade + '</strong><span>Grade</span>' +
        '</div>' +
        '<div class="result-summary-item">' +
            '<strong style="color:' + passClass + ';">' + (result.percentage >= 35 ? 'PASS' : 'FAIL') + '</strong><span>Result</span>' +
        '</div>';

    /* Subject-wise marksheet */
    var html = '<div class="card">' +
        '<div class="card-header"><h3>Subject-wise Marksheet</h3>' +
            '<span style="font-size:13px;color:#718096;">Published on: ' +
                (result.published_at ? new Date(result.published_at).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—') +
            '</span>' +
        '</div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>#</th><th>Subject</th><th>Max Marks</th><th>Marks Obtained</th><th>Grade</th><th>Status</th></tr></thead>' +
        '<tbody>';

    subjects.forEach(function(sub, i) {
        var mark = marks.find(function(m) { return m.subject_id === sub.id; });
        var score = mark ? mark.score : null;
        var pct   = score !== null ? (score / sub.max_marks) * 100 : null;
        var grade = pct !== null ? window.calcGrade(pct) : '—';
        var pass  = pct !== null && pct >= 35;

        html += '<tr>' +
            '<td>' + (i+1) + '</td>' +
            '<td><strong>' + esc(sub.subject_name) + '</strong></td>' +
            '<td>' + sub.max_marks + '</td>' +
            '<td>' + (score !== null ? '<strong>' + score + '</strong>' : '<span style="color:#aaa;">Not entered</span>') + '</td>' +
            '<td>' + (score !== null ? '<span class="badge ' + (pass ? 'badge-green' : 'badge-red') + '">' + grade + '</span>' : '—') + '</td>' +
            '<td>' + (score !== null ? '<span class="badge ' + (pass ? 'badge-green' : 'badge-red') + '">' + (pass ? 'Pass' : 'Fail') + '</span>' : '—') + '</td>' +
        '</tr>';
    });

    html += '</tbody></table></div></div>';

    /* Grade scale reference */
    html += '<div class="card" style="margin-top:20px;">' +
        '<div class="card-header"><h3>Grade Scale</h3></div>' +
        '<div class="card-body">' +
            '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
            [['O','≥75%','badge-green'],['A+','65–74%','badge-blue'],['A','55–64%','badge-blue'],
             ['B+','45–54%','badge-gold'],['B','35–44%','badge-gold'],['F','<35%','badge-red']]
            .map(function(g) { return '<div style="display:flex;align-items:center;gap:8px;"><span class="badge ' + g[2] + '">' + g[0] + '</span><span style="font-size:13px;color:#718096;">' + g[1] + '</span></div>'; })
            .join('') +
            '</div>' +
        '</div></div>';

    content.innerHTML = html;
}

function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadResult();

</script>
</body>
</html>
